<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="ribbon" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0078D4"/>
      <stop offset="100%" style="stop-color:#005A9E"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-5%" width="120%" height="125%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#0078D4" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- 밝은 배경 (흰색, 둥근 모서리) -->
  <rect width="128" height="128" rx="28" fill="#F5F7FA"/>

  <!-- 미묘한 내부 그라디언트 오버레이 -->
  <rect width="128" height="128" rx="28" fill="url(#bgOverlay)" opacity="0.4"/>

  <!-- 책갈피 리본 그림자용 -->
  <polygon points="38,16 90,16 90,104 64,84 38,104"
    fill="#0060B0" opacity="0.12"/>

  <!-- 메인 책갈피 리본 -->
  <polygon points="36,14 88,14 88,102 62,82 36,102"
    fill="url(#ribbon)" filter="url(#shadow)"/>

  <!-- 리본 위 텍스트 라인 (흰색) -->
  <rect x="48" y="32" width="28" height="4.5" rx="2.25" fill="white" opacity="0.95"/>
  <rect x="48" y="44" width="22" height="4.5" rx="2.25" fill="white" opacity="0.75"/>
  <rect x="48" y="56" width="25" height="4.5" rx="2.25" fill="white" opacity="0.55"/>

  <!-- 리본 하단 V 컷 강조선 -->
  <line x1="36" y1="102" x2="62" y2="82" stroke="white" stroke-width="1.5" opacity="0.3"/>
  <line x1="88" y1="102" x2="62" y2="82" stroke="white" stroke-width="1.5" opacity="0.3"/>
</svg>
