<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Promo Tile Preview</title>
  <style>
    body { background: #888; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; font-family: sans-serif; gap: 16px; }
    .label { color: white; font-size: 14px; }
    .tile { border: 2px solid white; box-shadow: 0 4px 20px rgba(0,0,0,0.4); }
  </style>
</head>
<body>
  <div class="label">프로모션 타일 440×280 (실제 크기)</div>
  <img class="tile" src="promo-tile.svg" width="440" height="280">
  <div class="label">2× 확대</div>
  <img class="tile" src="promo-tile.svg" width="880" height="560">
</body>
</html>
