<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 280" width="440" height="280">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F0F6FF"/>
      <stop offset="100%" style="stop-color:#E8F0FE"/>
    </linearGradient>
    <linearGradient id="ribbon" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0078D4"/>
      <stop offset="100%" style="stop-color:#005A9E"/>
    </linearGradient>
    <linearGradient id="card1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF"/>
      <stop offset="100%" style="stop-color:#F8FBFF"/>
    </linearGradient>
    <filter id="cardShadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#0078D4" flood-opacity="0.12"/>
    </filter>
    <filter id="iconShadow">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#0078D4" flood-opacity="0.2"/>
    </filter>
  </defs>

  <!-- 배경 -->
  <rect width="440" height="280" fill="url(#bg)"/>

  <!-- 배경 장식 원 -->
  <circle cx="390" cy="40" r="80" fill="#0078D4" opacity="0.05"/>
  <circle cx="50" cy="240" r="60" fill="#0078D4" opacity="0.04"/>

  <!-- ── 왼쪽: 앱 아이콘 + 이름 ── -->
  <!-- 아이콘 배경 -->
  <rect x="36" y="72" width="72" height="72" rx="16" fill="white" filter="url(#iconShadow)"/>

  <!-- 책갈피 리본 (아이콘 내부) -->
  <polygon points="49,83 97,83 97,136 73,120 49,136" fill="#F0F6FF"/>
  <polygon points="51,83 95,83 95,136 73,119 51,136" fill="url(#ribbon)"/>
  <rect x="59" y="92" width="22" height="3.5" rx="1.75" fill="white" opacity="0.95"/>
  <rect x="59" y="100" width="17" height="3.5" rx="1.75" fill="white" opacity="0.7"/>
  <rect x="59" y="108" width="19" height="3.5" rx="1.75" fill="white" opacity="0.5"/>

  <!-- 앱 이름 -->
  <text x="36" y="172" font-family="'Segoe UI', system-ui, sans-serif" font-size="28" font-weight="700" fill="#0078D4">갈피</text>
  <text x="36" y="194" font-family="'Segoe UI', system-ui, sans-serif" font-size="12" fill="#666" letter-spacing="1">for Windows</text>

  <!-- 태그라인 -->
  <text x="36" y="230" font-family="'Segoe UI', system-ui, sans-serif" font-size="13" fill="#333" font-weight="500">작업 맥락을 저장하고</text>
  <text x="36" y="248" font-family="'Segoe UI', system-ui, sans-serif" font-size="13" fill="#333" font-weight="500">언제든 돌아오세요</text>

  <!-- ── 오른쪽: UI 목업 카드들 ── -->
  <!-- 사이드패널 목업 배경 -->
  <rect x="200" y="24" width="216" height="236" rx="14" fill="white" filter="url(#cardShadow)"/>

  <!-- 패널 헤더 -->
  <rect x="200" y="24" width="216" height="44" rx="14" fill="#1C1C1C"/>
  <rect x="200" y="52" width="216" height="16" fill="#1C1C1C"/>
  <text x="219" y="52" font-family="'Segoe UI', system-ui, sans-serif" font-size="13" font-weight="600" fill="white">📌 갈피</text>
  <rect x="364" y="35" width="38" height="20" rx="5" fill="#0078D4"/>
  <text x="369" y="49" font-family="'Segoe UI', system-ui, sans-serif" font-size="10" font-weight="600" fill="white">+ 저장</text>

  <!-- 컨텍스트 카드 1 -->
  <rect x="212" y="76" width="192" height="52" rx="8" fill="#F8FBFF" stroke="#E8F0FE" stroke-width="1"/>
  <circle cx="228" cy="102" r="5" fill="#0078D4"/>
  <text x="240" y="98" font-family="'Segoe UI', system-ui, sans-serif" font-size="12" font-weight="600" fill="#1a1a1a">A 프로젝트</text>
  <text x="240" y="113" font-family="'Segoe UI', system-ui, sans-serif" font-size="10" fill="#888">탭 7개</text>
  <!-- 재개 버튼 -->
  <rect x="362" y="94" width="30" height="18" rx="4" fill="#0078D4" opacity="0.15"/>
  <text x="369" y="107" font-family="'Segoe UI', system-ui, sans-serif" font-size="11" fill="#0078D4">▶</text>

  <!-- 컨텍스트 카드 2 -->
  <rect x="212" y="136" width="192" height="52" rx="8" fill="#F8FBFF" stroke="#E8F0FE" stroke-width="1"/>
  <circle cx="228" cy="162" r="5" fill="#10B981"/>
  <text x="240" y="158" font-family="'Segoe UI', system-ui, sans-serif" font-size="12" font-weight="600" fill="#1a1a1a">B 리서치</text>
  <text x="240" y="173" font-family="'Segoe UI', system-ui, sans-serif" font-size="10" fill="#888">탭 3개 · 어제</text>
  <rect x="362" y="154" width="30" height="18" rx="4" fill="#10B981" opacity="0.15"/>
  <text x="369" y="167" font-family="'Segoe UI', system-ui, sans-serif" font-size="11" fill="#10B981">▶</text>

  <!-- 컨텍스트 카드 3 -->
  <rect x="212" y="196" width="192" height="52" rx="8" fill="#F8FBFF" stroke="#E8F0FE" stroke-width="1"/>
  <circle cx="228" cy="222" r="5" fill="#F59E0B"/>
  <text x="240" y="218" font-family="'Segoe UI', system-ui, sans-serif" font-size="12" font-weight="600" fill="#1a1a1a">C 주간 보고</text>
  <text x="240" y="233" font-family="'Segoe UI', system-ui, sans-serif" font-size="10" fill="#888">탭 5개 · 3일 전</text>
  <rect x="362" y="214" width="30" height="18" rx="4" fill="#F59E0B" opacity="0.15"/>
  <text x="369" y="227" font-family="'Segoe UI', system-ui, sans-serif" font-size="11" fill="#F59E0B">▶</text>
</svg>
